apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-v1
  template:
    metadata:
      labels:
        app: app-v1
    spec:
      containers:
      - name: app
        image: lokesh1926/devops-app:v1
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: service-v1
spec:
  type: NodePort
  selector:
    app: app-v1
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30001